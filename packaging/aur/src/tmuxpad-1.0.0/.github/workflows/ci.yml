name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext qml6-module-qtqml zip
          # qmllint ships with qt6-declarative-dev-tools on newer Ubuntu
          sudo apt-get install -y qt6-declarative-dev-tools || true

      - name: Validate metadata.json
        run: python3 -c "import json; json.load(open('metadata.json'))"

      - name: Validate translations
        run: |
          for po in po/*.po; do msgfmt -c "$po" -o /dev/null; done

      - name: qmllint (informational — Plasma imports may be unresolved in CI)
        continue-on-error: true
        run: |
          which qmllint6 qmllint 2>/dev/null || true
          for f in contents/ui/*.qml contents/config/config.qml; do
            (qmllint6 "$f" || qmllint "$f") || true
          done

      - name: Build .plasmoid package
        run: make package

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: tmuxpad-plasmoid
          path: "*.plasmoid"

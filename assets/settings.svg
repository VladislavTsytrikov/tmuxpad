<svg width="600" height="752" viewBox="0 0 600 752" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="600" y2="752" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1b26"/><stop offset="1" stop-color="#13131a"/>
    </linearGradient>
    <radialGradient id="gG" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#9ece6a" stop-opacity="0.22"/><stop offset="1" stop-color="#9ece6a" stop-opacity="0"/></radialGradient>
    <radialGradient id="gB" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#7aa2f7" stop-opacity="0.26"/><stop offset="1" stop-color="#7aa2f7" stop-opacity="0"/></radialGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="14" stdDeviation="28" flood-color="#000" flood-opacity="0.55"/></filter>
    <filter id="card" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="4" stdDeviation="9" flood-color="#000" flood-opacity="0.42"/></filter>
  </defs>

  <rect width="600" height="752" fill="url(#page)"/>
  <circle cx="110" cy="120" r="260" fill="url(#gB)"/>
  <circle cx="500" cy="640" r="240" fill="url(#gG)"/>

  <!-- widget window -->
  <g filter="url(#sh)">
    <rect x="60" y="40" width="480" height="672" rx="20" fill="#16161e" stroke="#2a2e42" stroke-width="1.5"/>
  </g>

  <!-- ===== header: back · Settings ===== -->
  <g stroke="#787c99" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M98 71 l-8 0 m4 -5 l-5 5 l5 5"/>
  </g>
  <text x="116" y="78" font-family="OpenSans, sans-serif" font-weight="700" font-size="19" fill="#c0caf5">Settings</text>
  <line x1="84" y1="98" x2="516" y2="98" stroke="#2a2e42" stroke-width="1.2"/>

  <!-- ============ Card 1 · Put it on your desktop (highlighted) ============ -->
  <g filter="url(#card)"><rect x="84" y="114" width="432" height="132" rx="14" fill="#1d2030"/></g>
  <rect x="84" y="114" width="432" height="132" rx="14" fill="none" stroke="#9ece6a" stroke-opacity="0.45" stroke-width="1.4"/>
  <!-- icon chip: monitor -->
  <rect x="102" y="132" width="30" height="30" rx="7" fill="#9ece6a" fill-opacity="0.15"/>
  <g stroke="#9ece6a" stroke-width="1.8" fill="none" stroke-linejoin="round">
    <rect x="109" y="139" width="16" height="11" rx="1.5"/><path d="M114 154h6 M113 156h8"/>
  </g>
  <text x="144" y="153" font-family="OpenSans, sans-serif" font-weight="700" font-size="16" fill="#c0caf5">Put it on your desktop</text>
  <line x1="102" y1="172" x2="498" y2="172" stroke="#9ece6a" stroke-opacity="0.18" stroke-width="1"/>
  <text x="102" y="194" font-family="OpenSans, sans-serif" font-size="12.5" fill="#9aa5ce">Drop TmuxPad on the desktop for a big, always-on</text>
  <text x="102" y="211" font-family="OpenSans, sans-serif" font-size="12.5" fill="#9aa5ce">mission-control dashboard — or keep it in the panel.</text>
  <!-- button -->
  <rect x="102" y="222" width="148" height="34" rx="9" fill="#9ece6a" fill-opacity="0.18" stroke="#9ece6a" stroke-opacity="0.5"/>
  <g stroke="#9ece6a" stroke-width="2" stroke-linecap="round"><path d="M118 239h10 M123 234v10"/></g>
  <text x="136" y="244" font-family="OpenSans, sans-serif" font-weight="600" font-size="13.5" fill="#9ece6a">Add to desktop</text>

  <!-- ============ Card 2 · Terminal ============ -->
  <g filter="url(#card)"><rect x="84" y="262" width="432" height="152" rx="14" fill="#1a1b26"/></g>
  <rect x="102" y="280" width="30" height="30" rx="7" fill="#7aa2f7" fill-opacity="0.15"/>
  <g stroke="#7aa2f7" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="108" y="286" width="18" height="18" rx="2.5"/><path d="M112 292l4 3 -4 3 M118 298h4"/>
  </g>
  <text x="144" y="301" font-family="OpenSans, sans-serif" font-weight="700" font-size="16" fill="#c0caf5">Terminal</text>
  <line x1="102" y1="320" x2="498" y2="320" stroke="#2a2e42" stroke-width="1"/>
  <!-- combobox row -->
  <text x="102" y="345" font-family="OpenSans, sans-serif" font-size="13" fill="#9aa5ce">Open tmux in:</text>
  <rect x="196" y="330" width="302" height="30" rx="8" fill="#13141c" stroke="#2a2e42" stroke-width="1.2"/>
  <text x="210" y="350" font-family="OpenSans, sans-serif" font-size="13" fill="#c0caf5">Automatic (Konsole)</text>
  <path d="M478 342 l5 5 5 -5" stroke="#787c99" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- live command preview -->
  <rect x="102" y="368" width="396" height="28" rx="7" fill="#0f1018"/>
  <text x="114" y="386" font-family="JetBrains Mono, monospace" font-size="12.5" fill="#7aa2f7">› konsole -e tmux attach -t %1</text>

  <!-- ============ Card 3 · Updates ============ -->
  <g filter="url(#card)"><rect x="84" y="430" width="432" height="104" rx="14" fill="#1a1b26"/></g>
  <rect x="102" y="448" width="30" height="30" rx="7" fill="#e0af68" fill-opacity="0.15"/>
  <g stroke="#e0af68" stroke-width="1.8" fill="none" stroke-linecap="round"><path d="M125 457a8 8 0 1 0 1.5 5"/><path d="M125 452v6h-6"/></g>
  <text x="144" y="469" font-family="OpenSans, sans-serif" font-weight="700" font-size="16" fill="#c0caf5">Updates</text>
  <line x1="102" y1="488" x2="498" y2="488" stroke="#2a2e42" stroke-width="1"/>
  <text x="102" y="514" font-family="OpenSans, sans-serif" font-size="13" fill="#9aa5ce">Refresh every, sec:</text>
  <rect x="232" y="500" width="58" height="26" rx="7" fill="#13141c" stroke="#2a2e42" stroke-width="1.1"/>
  <text x="250" y="517" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0caf5">3</text>
  <g stroke="#787c99" stroke-width="1.4" fill="none" stroke-linecap="round"><path d="M276 510l3-3 3 3 M276 517l3 3 3-3"/></g>
  <text x="312" y="514" font-family="OpenSans, sans-serif" font-size="13" fill="#9aa5ce">Preview lines:</text>
  <rect x="416" y="500" width="58" height="26" rx="7" fill="#13141c" stroke="#2a2e42" stroke-width="1.1"/>
  <text x="432" y="517" font-family="JetBrains Mono, monospace" font-size="13" fill="#c0caf5">12</text>
  <g stroke="#787c99" stroke-width="1.4" fill="none" stroke-linecap="round"><path d="M460 510l3-3 3 3 M460 517l3 3 3-3"/></g>

  <!-- ============ Card 4 · Notifications ============ -->
  <g filter="url(#card)"><rect x="84" y="550" width="432" height="120" rx="14" fill="#1a1b26"/></g>
  <rect x="102" y="568" width="30" height="30" rx="7" fill="#bb9af7" fill-opacity="0.15"/>
  <g stroke="#bb9af7" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M111 593c0-8 3-11 6-11s6 3 6 11c2 0 3 1 3 2h-18c0-1 1-2 3-2z"/><path d="M115 597a2 2 0 0 0 4 0"/>
  </g>
  <text x="144" y="589" font-family="OpenSans, sans-serif" font-weight="700" font-size="16" fill="#c0caf5">Notifications</text>
  <line x1="102" y1="608" x2="498" y2="608" stroke="#2a2e42" stroke-width="1"/>
  <!-- checked: when an agent needs input -->
  <rect x="102" y="622" width="18" height="18" rx="5" fill="#9ece6a" fill-opacity="0.9"/>
  <path d="M106 631 l3.5 3.5 6 -7" stroke="#16161e" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="130" y="636" font-family="OpenSans, sans-serif" font-size="13.5" fill="#c0caf5">When an agent needs input</text>
  <!-- checked: when an agent finishes working -->
  <rect x="102" y="648" width="18" height="18" rx="5" fill="#9ece6a" fill-opacity="0.9"/>
  <path d="M106 657 l3.5 3.5 6 -7" stroke="#16161e" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="130" y="662" font-family="OpenSans, sans-serif" font-size="13.5" fill="#c0caf5">When an agent finishes working</text>

  <!-- footer hint -->
  <text x="300" y="698" text-anchor="middle" font-family="OpenSans, sans-serif" font-size="11.5" fill="#565f89">Changes apply live · ⚙ also reachable from right-click → Configure</text>
</svg>

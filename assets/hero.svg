    </linearGradient>
    <radialGradient id="gO" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ff9e64" stop-opacity="0.30"/><stop offset="1" stop-color="#ff9e64" stop-opacity="0"/></radialGradient>
    <radialGradient id="gB" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#7aa2f7" stop-opacity="0.28"/><stop offset="1" stop-color="#7aa2f7" stop-opacity="0"/></radialGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="14" stdDeviation="28" flood-color="#000" flood-opacity="0.55"/></filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#ff9e64" flood-opacity="0.45"/></filter>

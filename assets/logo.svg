<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#222536"/><stop offset="1" stop-color="#15151d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.42" cy="0.55" r="0.55">
      <stop offset="0" stop-color="#9ece6a" stop-opacity="0.20"/><stop offset="1" stop-color="#9ece6a" stop-opacity="0"/>
    </radialGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)" stroke="#2e3350" stroke-width="3"/>
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#glow)"/>
  <!-- top sheen -->
  <rect x="32" y="32" width="448" height="220" rx="104" fill="#ffffff" fill-opacity="0.03"/>

  <!-- terminal prompt: chevron + cursor bar -->
  <g filter="url(#ds)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M168 176 L286 256 L168 336" stroke="#9ece6a" stroke-width="40"/>
    <path d="M320 336 L392 336" stroke="#c0caf5" stroke-width="40"/>
  </g>

  <!-- "needs you" notification badge -->
  <circle cx="392" cy="150" r="62" fill="#15151d"/>
  <circle cx="392" cy="150" r="48" fill="#ff9e64"/>
  <circle cx="392" cy="150" r="48" fill="#ffffff" fill-opacity="0.10"/>
</svg>
